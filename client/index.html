<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tether - Watch Party</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Phosphor Icons (regular + duotone) -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/duotone/style.css" />
    <style>
      /* =====================================================================
         NEO-BRUTALIST DESIGN SYSTEM
         Hard borders, zero radius, chunky offset shadows, visible grid lines,
         bold uppercase headings. Palette and fonts preserved.
      ===================================================================== */

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        /* Palette */
        --bg-primary: #050505;
        --bg-secondary: #0b0b0b;
        --bg-elevated: #141414;
        --bg-card: #0e0e0e;
        --text-primary: #e6e6e6;
        --text-secondary: #b5b5b5;
        --text-muted: #6e6e6e;
        --accent: #3fd555;
        --accent-hover: #5ee874;
        --accent-glow: rgba(63, 213, 85, 0.25);
        --primary: #fdeca0;
        --secondary: #79e2ce;
        --success: #3fd555;
        --warning: #fdeca0;
        --error: #ff5b5b;

        /* Brutalist structural tokens */
        --line: #3a3a3a;          /* visible but easy-on-the-eyes borders */
        --line-dim: #222222;      /* secondary grid lines */
        --border: #222222;        /* legacy alias used in some places */
        --bw: 2px;                /* standard border width */
        --bw-thick: 3px;          /* heavy border width */
        --radius: 0px;            /* brutalism: no rounding */
        --radius-lg: 0px;

        /* Offset block shadows */
        --shadow: 6px 6px 0 0 var(--line);
        --shadow-sm: 3px 3px 0 0 var(--line);
        --shadow-accent: 6px 6px 0 0 var(--accent);
        --shadow-primary: 8px 8px 0 0 var(--primary);

        --transition: 90ms ease;
      }

      body {
        font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      #app {
        min-height: 100vh;
      }

      button {
        cursor: pointer;
        border: none;
        background: none;
        font-family: inherit;
        font-size: inherit;
        color: inherit;
      }

      input {
        font-family: inherit;
        font-size: inherit;
      }

      h1, h2, h3, h4 {
        font-family: 'Instrument Sans', sans-serif;
        letter-spacing: 0.02em;
        font-weight: 700;
      }

      ::selection {
        background: var(--accent);
        color: #050505;
      }

      /* === App Layout === */
      .app--home {
        display: block;
        min-height: 100vh;
      }

      .home-wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.7rem 1.25rem;
        border-bottom: var(--bw) solid var(--line);
        background: var(--bg-secondary);
      }

      .topbar__brand {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      .topbar__brand-icon {
        font-size: 1.6rem;
        color: var(--accent);
        line-height: 1;
      }

      .topbar__brand-name {
        font-family: 'Instrument Sans', sans-serif;
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--primary);
        letter-spacing: 0.02em;
      }

      .topbar__tagline {
        font-size: 0.8rem;
        color: var(--text-secondary);
        letter-spacing: 0.04em;
      }

      .topbar__gh {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.4rem 0.7rem;
        border: var(--bw) solid var(--line);
        color: var(--text-primary);
        text-decoration: none;
        font-size: 0.78rem;
        font-weight: 600;
        transition: background var(--transition), color var(--transition);
      }

      .topbar__gh:hover {
        background: var(--text-primary);
        color: var(--bg-primary);
      }

      .home-main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .app--room {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* === Home (bento grid) === */
      .home {
        width: 100%;
        max-width: 480px;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .home__features {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
      }

      .feature-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.4rem 0.7rem;
        border: var(--bw) solid var(--line-dim);
        background: var(--bg-card);
        font-size: 0.76rem;
        color: var(--text-secondary);
      }

      .feature-chip i {
        font-size: 1.05rem;
        line-height: 1;
      }

      .bento {
        background: var(--bg-card);
        border: var(--bw) solid var(--line);
        border-radius: 0;
      }

      .home__form-card {
        padding: 1.5rem;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
      }

      /* Create-form: audio tracks + advanced */
      .room-join__label-opt {
        color: var(--text-muted);
        font-weight: 400;
        letter-spacing: 0;
      }

      .audio-tracks__list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .audio-row {
        display: flex;
        gap: 0.4rem;
      }

      .audio-row__label,
      .audio-row__url {
        background: var(--bg-primary);
        border: var(--bw) solid var(--line);
        padding: 0.5rem 0.6rem;
        color: var(--text-primary);
        outline: none;
        font-size: 0.85rem;
        border-radius: 0;
      }

      .audio-row__label {
        width: 38%;
      }

      .audio-row__url {
        flex: 1;
        min-width: 0;
      }

      .audio-row__label:focus,
      .audio-row__url:focus {
        border-color: var(--accent);
      }

      .audio-row__remove {
        flex-shrink: 0;
        width: 38px;
        border: var(--bw) solid var(--line);
        background: var(--bg-elevated);
        color: var(--text-secondary);
      }

      .audio-row__remove:hover {
        background: var(--error);
        color: #050505;
      }

      .audio-add {
        align-self: flex-start;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        margin-top: 0.5rem;
        padding: 0.4rem 0.7rem;
        border: var(--bw) solid var(--line);
        background: var(--bg-elevated);
        color: var(--text-primary);
        font-size: 0.78rem;
        font-weight: 600;
        transition: background var(--transition), color var(--transition);
      }

      .audio-add:hover {
        background: var(--secondary);
        color: #050505;
      }

      .room-join__advanced {
        border: var(--bw) solid var(--line-dim);
        padding: 0.5rem 0.75rem;
      }

      .room-join__advanced summary {
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-secondary);
        list-style: none;
      }

      .room-join__advanced summary::-webkit-details-marker {
        display: none;
      }

      .room-join__advanced[open] summary {
        margin-bottom: 0.75rem;
        color: var(--text-primary);
      }

      .room-join__advanced .room-join__field {
        margin-bottom: 0.75rem;
      }

      /* Rooms ready (linked rooms) */
      .created__title {
        font-size: 1.4rem;
        color: var(--primary);
        margin-bottom: 0.4rem;
      }

      .created__hint {
        font-size: 0.8rem;
        color: var(--text-secondary);
        margin-bottom: 1.25rem;
      }

      .created__rooms {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .created__room {
        border: var(--bw) solid var(--line);
        background: var(--bg-primary);
        padding: 0.85rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .created__label {
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        color: var(--text-secondary);
        font-weight: 700;
      }

      .created__code {
        font-family: 'Geist Mono', monospace;
        font-size: 1.5rem;
        letter-spacing: 0.15em;
        color: var(--accent);
      }

      .created__actions {
        display: flex;
        gap: 0.5rem;
      }

      .created__copy,
      .created__enter {
        flex: 1;
        padding: 0.5rem;
        border: var(--bw) solid var(--line);
        font-size: 0.78rem;
        font-weight: 700;
        transition: transform var(--transition), box-shadow var(--transition);
      }

      .created__copy {
        background: var(--bg-elevated);
        color: var(--text-primary);
      }

      .created__enter {
        background: var(--accent);
        color: #050505;
      }

      .created__copy:hover,
      .created__enter:hover {
        transform: translate(-1px, -1px);
        box-shadow: 2px 2px 0 0 var(--line);
      }

      .created__back {
        margin-top: 1rem;
        font-size: 0.78rem;
        color: var(--text-secondary);
        background: none;
        border: none;
        cursor: pointer;
      }

      .created__back:hover {
        color: var(--text-primary);
      }

      /* === Room Join (form within bento) === */
      .room-join {
        width: 100%;
        max-width: 440px;
      }

      .room-join__card {
        background: var(--bg-card);
        border: var(--bw-thick) solid var(--line);
        border-radius: 0;
        padding: 2.5rem 2rem;
        box-shadow: var(--shadow-primary);
      }

      .room-join__title {
        font-size: 2.6rem;
        font-weight: 700;
        text-align: center;
        letter-spacing: 0.08em;
        margin-bottom: 0.5rem;
        color: var(--primary);
      }

      .room-join__subtitle {
        text-align: center;
        color: var(--text-secondary);
        margin-bottom: 2rem;
        font-size: 0.8rem;
        letter-spacing: 0.18em;
      }

      .room-join__tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        margin-bottom: 1.5rem;
        border: var(--bw) solid var(--line);
      }

      .room-join__tab {
        padding: 0.7rem 1rem;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: var(--text-secondary);
        background: var(--bg-primary);
        transition: all var(--transition);
      }

      .room-join__tab:first-child {
        border-right: var(--bw) solid var(--line);
      }

      .room-join__tab:hover {
        color: var(--text-primary);
        background: var(--bg-elevated);
      }

      .room-join__tab--active {
        background: var(--secondary);
        color: #050505;
      }

      .room-join__tab--active:hover {
        background: var(--secondary);
        color: #050505;
      }

      .room-join__form {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
      }

      .room-join__field {
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }

      .room-join__field label {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: 0.1em;
      }

      .room-join__field input {
        background: var(--bg-primary);
        border: var(--bw) solid var(--line);
        border-radius: 0;
        padding: 0.75rem 1rem;
        color: var(--text-primary);
        transition: box-shadow var(--transition);
        outline: none;
      }

      .room-join__field input:focus {
        box-shadow: var(--shadow-sm);
        border-color: var(--accent);
      }

      .room-join__field input::placeholder {
        color: var(--text-muted);
      }

      .room-join__hint {
        font-size: 0.72rem;
        color: var(--text-muted);
        margin-top: 0.3rem;
      }

      .room-join__submit {
        background: var(--accent);
        color: #050505;
        padding: 0.85rem 1.5rem;
        border: var(--bw) solid var(--line);
        border-radius: 0;
        font-weight: 700;
        font-size: 0.85rem;
        letter-spacing: 0.08em;
        box-shadow: var(--shadow-sm);
        transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
        margin-top: 0.5rem;
      }

      .room-join__submit:hover:not(:disabled) {
        background: var(--accent-hover);
        transform: translate(-2px, -2px);
        box-shadow: 5px 5px 0 0 var(--line);
      }

      .room-join__submit:active:not(:disabled) {
        transform: translate(2px, 2px);
        box-shadow: 1px 1px 0 0 var(--line);
      }

      .room-join__submit:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .room-join__error {
        background: var(--error);
        border: var(--bw) solid var(--line);
        color: #050505;
        font-weight: 600;
        padding: 0.6rem 1rem;
        border-radius: 0;
        font-size: 0.82rem;
        margin-bottom: 1rem;
      }

      /* === Room Layout (visible grid lines between regions) === */
      .room-layout {
        display: flex;
        flex: 1;
        overflow: hidden;
        border-bottom: var(--bw) solid var(--line);
      }

      .room-layout__video {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .room-layout__chat {
        width: 340px;
        flex-shrink: 0;
        border-left: var(--bw) solid var(--line);
        display: flex;
        flex-direction: column;
        background: var(--bg-secondary);
      }

      /* === Video Player === */
      .video-player {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        position: relative;
      }

      .video-player--active,
      .video-player--embedded {
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;
      }

      .video-player__video {
        width: 100%;
        height: 100%;
        flex: 1;
        object-fit: contain;
        background: #000;
        cursor: pointer;
      }

      .video-player__embed-frame {
        flex: 1;
        width: 100%;
        min-height: 0;
        position: relative;
        background: #000;
      }

      .video-player__iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        background: #000;
      }

      .video-player__buffering {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.55);
        z-index: 5;
        pointer-events: none;
      }

      .video-player__spinner {
        width: 40px;
        height: 40px;
        border: var(--bw-thick) solid rgba(230, 230, 230, 0.25);
        border-top-color: var(--accent);
        border-radius: 0;
        animation: spin 0.8s steps(8) infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .video-player__controls {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.75rem;
        background: var(--bg-secondary);
        border-top: var(--bw) solid var(--line);
        width: 100%;
        min-width: 0;
        overflow: hidden;
      }

      .video-player__controls--embed {
        justify-content: space-between;
      }

      .video-player__play-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border: var(--bw) solid var(--line);
        border-radius: 0;
        background: var(--accent);
        color: #050505;
        transition: transform var(--transition), box-shadow var(--transition);
        flex-shrink: 0;
      }

      .video-player__play-btn:hover {
        transform: translate(-1px, -1px);
        box-shadow: 2px 2px 0 0 var(--line);
      }

      .video-player__play-btn:active {
        transform: translate(1px, 1px);
        box-shadow: none;
      }

      .video-player__seek-container {
        flex: 1;
        display: flex;
        align-items: center;
        min-width: 0;
      }

      .video-player__seek {
        width: 100%;
        min-width: 0;
        height: 10px;
        appearance: none;
        -webkit-appearance: none;
        background: var(--bg-elevated);
        border: var(--bw) solid var(--line);
        border-radius: 0;
        outline: none;
        cursor: pointer;
      }

      .video-player__seek::-webkit-slider-thumb {
        appearance: none;
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 0;
        background: var(--accent);
        border: var(--bw) solid var(--line);
        cursor: pointer;
        margin-top: -1px;
      }

      .video-player__seek::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 0;
        background: var(--accent);
        cursor: pointer;
        border: var(--bw) solid var(--line);
      }

      .video-player__time {
        font-size: 0.75rem;
        color: var(--text-secondary);
        font-family: 'Geist Mono', monospace;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .video-player__volume {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        flex-shrink: 0;
      }

      .video-player__volume-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border: var(--bw) solid var(--line);
        border-radius: 0;
        background: var(--bg-elevated);
        color: var(--text-primary);
        transition: background var(--transition), color var(--transition);
      }

      .video-player__volume-btn:hover {
        background: var(--secondary);
        color: #050505;
      }

      .video-player__volume-slider {
        width: 64px;
        height: 8px;
        appearance: none;
        -webkit-appearance: none;
        background: var(--bg-elevated);
        border: var(--bw) solid var(--line);
        border-radius: 0;
        outline: none;
        cursor: pointer;
      }

      .video-player__volume-slider::-webkit-slider-thumb {
        appearance: none;
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 0;
        background: var(--secondary);
        border: var(--bw) solid var(--line);
        cursor: pointer;
      }

      .video-player__volume-slider::-moz-range-thumb {
        width: 12px;
        height: 12px;
        border-radius: 0;
        background: var(--secondary);
        cursor: pointer;
        border: var(--bw) solid var(--line);
      }

      .video-player__fullscreen-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border: var(--bw) solid var(--line);
        border-radius: 0;
        background: var(--bg-elevated);
        color: var(--text-primary);
        transition: background var(--transition), color var(--transition);
        flex-shrink: 0;
      }

      .video-player__fullscreen-btn:hover {
        background: var(--secondary);
        color: #050505;
      }

      .video-player__lang {
        position: relative;
        flex-shrink: 0;
      }

      .video-player__lang-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border: var(--bw) solid var(--line);
        border-radius: 0;
        background: var(--bg-elevated);
        color: var(--text-primary);
        transition: background var(--transition), color var(--transition);
      }

      .video-player__lang-btn:hover {
        background: var(--secondary);
        color: #050505;
      }

      .video-player__lang-btn i {
        font-size: 1.25rem;
        line-height: 1;
      }

      .video-player__lang-menu {
        position: absolute;
        bottom: calc(100% + 8px);
        right: 0;
        min-width: 190px;
        background: var(--bg-card);
        border: var(--bw) solid var(--line);
        box-shadow: var(--shadow-sm);
        z-index: 20;
        padding: 0.3rem;
      }

      .lang-menu__section {
        font-size: 0.62rem;
        letter-spacing: 0.1em;
        color: var(--text-muted);
        padding: 0.45rem 0.5rem 0.25rem;
      }

      .lang-menu__item {
        display: block;
        width: 100%;
        text-align: left;
        padding: 0.5rem 0.6rem;
        font-size: 0.82rem;
        color: var(--text-primary);
        border: var(--bw) solid transparent;
        background: none;
        transition: background var(--transition), border-color var(--transition);
      }

      .lang-menu__item:hover {
        background: var(--bg-elevated);
      }

      .lang-menu__item--active {
        border-color: var(--accent);
        color: var(--accent);
        font-weight: 600;
      }

      .lang-menu__item--link {
        color: var(--secondary);
        font-weight: 600;
      }

      .video-player__embed-status {
        display: flex;
        align-items: center;
        font-size: 0.72rem;
        color: var(--text-primary);
        letter-spacing: 0.12em;
        font-weight: 700;
        border: var(--bw) solid var(--line);
        padding: 0.25rem 0.45rem;
        background: var(--bg-elevated);
      }

      .video-player__embed-status svg {
        display: block;
      }

      .video-player__placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        color: var(--text-muted);
        border: var(--bw) dashed var(--line-dim);
        padding: 2.5rem 3rem;
        background: var(--bg-secondary);
      }

      .video-player__placeholder svg {
        opacity: 0.5;
      }

      .video-player__placeholder p {
        font-size: 0.85rem;
        letter-spacing: 0.08em;
      }

      .video-player__room-code {
        font-size: 0.85rem;
        color: var(--text-secondary);
      }

      .video-player__room-code strong {
        color: var(--accent);
        font-family: 'Geist Mono', monospace;
        letter-spacing: 0.12em;
      }

      /* Fullscreen styles */
      .video-player:fullscreen {
        display: flex;
        flex-direction: column;
      }

      .video-player:fullscreen .video-player__video {
        flex: 1;
      }

      .video-player:fullscreen .video-player__controls {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(5, 5, 5, 0.92);
        z-index: 10;
      }

      /* === Chat === */
      .chat {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .chat__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.85rem 1rem;
        border-bottom: var(--bw) solid var(--line);
        background: var(--bg-elevated);
      }

      .chat__header h3 {
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .chat__header-actions {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .chat__collapse-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border: var(--bw) solid var(--line);
        border-radius: 0;
        background: var(--bg-elevated);
        color: var(--text-primary);
        transition: background var(--transition), color var(--transition);
        flex-shrink: 0;
      }

      .chat__collapse-btn:hover {
        background: var(--secondary);
        color: #050505;
      }

      .chat__collapse-btn i {
        font-size: 1rem;
        line-height: 1;
      }

      /* Floating button to reopen a collapsed chat */
      .chat-reopen {
        position: fixed;
        top: 1rem;
        right: 1rem;
        z-index: 60;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        border: var(--bw) solid var(--line);
        border-radius: 0;
        background: var(--accent);
        color: #050505;
        box-shadow: var(--shadow-sm);
        transition: transform var(--transition), box-shadow var(--transition);
      }

      .chat-reopen:hover {
        transform: translate(-1px, -1px);
        box-shadow: 4px 4px 0 0 var(--line);
      }

      .chat-reopen:active {
        transform: translate(1px, 1px);
        box-shadow: 1px 1px 0 0 var(--line);
      }

      .chat-reopen i {
        font-size: 1.4rem;
        line-height: 1;
      }

      .chat__room-code {
        font-size: 0.72rem;
        font-family: 'Geist Mono', monospace;
        color: #050505;
        background: var(--primary);
        padding: 0.2rem 0.5rem;
        border: var(--bw) solid var(--line);
        font-weight: 600;
        letter-spacing: 0.06em;
      }

      .chat__messages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
      }

      .chat__empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-muted);
        font-size: 0.8rem;
        letter-spacing: 0.08em;
      }

      .chat__input-area {
        display: flex;
        gap: 0.6rem;
        padding: 0.75rem;
        border-top: var(--bw) solid var(--line);
        background: var(--bg-primary);
      }

      .chat__input {
        flex: 1;
        background: var(--bg-elevated);
        border: var(--bw) solid var(--line);
        border-radius: 0;
        padding: 0.6rem 0.8rem;
        color: var(--text-primary);
        outline: none;
        font-size: 0.9rem;
      }

      .chat__input:focus {
        border-color: var(--accent);
      }

      .chat__input::placeholder {
        color: var(--text-muted);
      }

      .chat__send {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        background: var(--accent);
        border: var(--bw) solid var(--line);
        border-radius: 0;
        color: #050505;
        transition: transform var(--transition), box-shadow var(--transition);
        flex-shrink: 0;
      }

      .chat__send:hover {
        transform: translate(-1px, -1px);
        box-shadow: 2px 2px 0 0 var(--line);
      }

      .chat__send:active {
        transform: translate(1px, 1px);
        box-shadow: none;
      }

      /* === Reaction Overlay === */
      .reaction-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 100;
        overflow: hidden;
      }

      .reaction-overlay__emoji {
        position: absolute;
        font-size: 2rem;
        animation: float-up 3s ease-out forwards;
      }

      @keyframes float-up {
        0% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateY(-200px) scale(0.5);
        }
      }

      /* === Status Bar === */
      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.5rem 1rem;
        background: var(--bg-elevated);
        font-size: 0.75rem;
        letter-spacing: 0.08em;
      }

      .status-bar__connection {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .status-bar__dot {
        width: 10px;
        height: 10px;
        border-radius: 0;
        border: 1px solid var(--line);
      }

      .status-bar__label {
        color: var(--text-secondary);
        font-weight: 600;
      }

      .status-bar__info {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .status-bar__participants {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--text-secondary);
        font-family: 'Geist Mono', monospace;
        font-weight: 500;
      }

      /* === Chat Messages === */
      .chat__message {
        padding: 0.6rem;
        margin-bottom: 0.5rem;
        border: var(--bw) solid var(--line-dim);
        background: var(--bg-card);
      }

      .chat__message:last-child {
        margin-bottom: 0;
      }

      .chat__message-header {
        display: flex;
        align-items: baseline;
        gap: 0.5rem;
        margin-bottom: 0.25rem;
      }

      .chat__message-sender {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--primary);
        letter-spacing: 0.04em;
      }

      .chat__message-time {
        font-size: 0.68rem;
        color: var(--text-muted);
        font-family: 'Geist Mono', monospace;
      }

      .chat__message-content {
        font-size: 0.88rem;
        color: var(--text-primary);
        word-wrap: break-word;
        overflow-wrap: break-word;
      }

      .chat__rate-limit {
        padding: 0.5rem 0.75rem;
        background: var(--error);
        border: var(--bw) solid var(--line);
        color: #050505;
        font-weight: 600;
        font-size: 0.78rem;
        text-align: center;
        margin: 0 0.75rem;
        letter-spacing: 0.04em;
      }

      /* === Emoji Picker === */
      .chat__emoji-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 0;
        background: var(--bg-elevated);
        border: var(--bw) solid var(--line);
        transition: background var(--transition);
        flex-shrink: 0;
      }

      .chat__emoji-btn:hover {
        background: var(--primary);
        color: #050505;
      }

      .chat__emoji-icon {
        font-size: 1.1rem;
        line-height: 1;
      }

      .chat__emoji-picker {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0;
        padding: 0;
        background: var(--bg-elevated);
        border-top: var(--bw) solid var(--line);
      }

      .chat__emoji-picker-item {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 44px;
        font-size: 1.3rem;
        border-right: var(--bw) solid var(--line-dim);
        border-bottom: var(--bw) solid var(--line-dim);
        transition: background var(--transition), transform var(--transition);
      }

      .chat__emoji-picker-item:hover {
        background: var(--secondary);
        transform: scale(1.1);
      }

      /* === Dashboard === */
      .dashboard {
        position: fixed;
        top: 1rem;
        left: 1rem;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .dashboard__toggle {
        background: var(--primary);
        border: var(--bw) solid var(--line);
        color: #050505;
        padding: 0.55rem 1rem;
        border-radius: 0;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        box-shadow: var(--shadow-sm);
        transition: transform var(--transition), box-shadow var(--transition);
      }

      .dashboard__toggle:hover {
        transform: translate(-1px, -1px);
        box-shadow: 4px 4px 0 0 var(--line);
      }

      .dashboard__toggle:active {
        transform: translate(1px, 1px);
        box-shadow: 1px 1px 0 0 var(--line);
      }

      .dashboard__panel {
        margin-top: 0.6rem;
        background: var(--bg-card);
        border: var(--bw-thick) solid var(--line);
        border-radius: 0;
        padding: 1rem;
        min-width: 340px;
        max-height: 420px;
        overflow-y: auto;
        box-shadow: var(--shadow);
      }

      .dashboard__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.85rem;
        padding-bottom: 0.6rem;
        border-bottom: var(--bw) solid var(--line);
      }

      .dashboard__header h4 {
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.06em;
      }

      .dashboard__resync-btn {
        background: var(--warning);
        color: #050505;
        padding: 0.4rem 0.8rem;
        border: var(--bw) solid var(--line);
        border-radius: 0;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        transition: transform var(--transition), box-shadow var(--transition);
      }

      .dashboard__resync-btn:hover {
        transform: translate(-1px, -1px);
        box-shadow: 2px 2px 0 0 var(--line);
      }

      .dashboard__list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .dashboard__participant {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.55rem 0.65rem;
        background: var(--bg-primary);
        border: var(--bw) solid var(--line-dim);
      }

      .dashboard__participant-info {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .dashboard__participant-name {
        font-size: 0.82rem;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: 0.03em;
      }

      .dashboard__badge {
        font-size: 0.62rem;
        font-weight: 700;
        padding: 0.12rem 0.4rem;
        border-radius: 0;
        letter-spacing: 0.05em;
        border: 1px solid var(--line);
      }

      .dashboard__badge--buffering {
        background: var(--warning);
        color: #050505;
      }

      .dashboard__participant-stats {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      .dashboard__stat {
        font-size: 0.7rem;
        color: var(--text-secondary);
        font-family: 'Geist Mono', monospace;
      }

      .dashboard__kick-btn {
        background: var(--error);
        border: var(--bw) solid var(--line);
        color: #050505;
        padding: 0.22rem 0.55rem;
        border-radius: 0;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        transition: transform var(--transition);
      }

      .dashboard__kick-btn:hover {
        transform: translate(-1px, -1px);
        box-shadow: 2px 2px 0 0 var(--line);
      }

      /* === Phosphor Icon Sizing === */
      .video-player__play-btn i,
      .video-player__volume-btn i,
      .video-player__fullscreen-btn i {
        font-size: 1.25rem;
        line-height: 1;
      }

      .chat__send i {
        font-size: 1.15rem;
        line-height: 1;
      }

      .status-bar__participants i {
        font-size: 0.95rem;
        line-height: 1;
      }

      /* === Responsive === */
      @media (max-width: 768px) {
        .home {
          grid-template-columns: 1fr;
        }

        .room-layout {
          flex-direction: column;
        }

        .room-layout__chat {
          width: 100%;
          height: 260px;
          border-left: none;
          border-top: var(--bw) solid var(--line);
        }

        .room-layout__video {
          flex: 1;
        }

        .dashboard {
          left: 1rem;
        }

        .room-join__card {
          padding: 1.5rem;
        }
      }

      @media (max-width: 480px) {
        .room-join__title {
          font-size: 2rem;
        }

        .room-join__card {
          padding: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
