<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tether - Watch Party</title>
    <style>
      /* === Reset & Base === */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #0f0f14;
        --bg-secondary: #1a1a24;
        --bg-elevated: #22222e;
        --bg-card: #1e1e2a;
        --text-primary: #e8e8ed;
        --text-secondary: #a0a0b0;
        --text-muted: #6b6b7b;
        --accent: #6c63ff;
        --accent-hover: #5a52e0;
        --accent-glow: rgba(108, 99, 255, 0.2);
        --success: #4caf50;
        --warning: #ff9800;
        --error: #f44336;
        --border: #2a2a3a;
        --radius: 8px;
        --radius-lg: 12px;
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        --transition: 150ms ease;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      #app {
        min-height: 100vh;
      }

      button {
        cursor: pointer;
        border: none;
        background: none;
        font-family: inherit;
        font-size: inherit;
        color: inherit;
      }

      input {
        font-family: inherit;
        font-size: inherit;
      }

      /* === App Layout === */
      .app--home {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1rem;
      }

      .app--room {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* === Room Join === */
      .room-join {
        width: 100%;
        max-width: 420px;
      }

      .room-join__card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 2.5rem 2rem;
        box-shadow: var(--shadow);
      }

      .room-join__title {
        font-size: 2.2rem;
        font-weight: 700;
        text-align: center;
        margin-bottom: 0.25rem;
        background: linear-gradient(135deg, #6c63ff, #b06cff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .room-join__subtitle {
        text-align: center;
        color: var(--text-secondary);
        margin-bottom: 2rem;
        font-size: 0.95rem;
      }

      .room-join__tabs {
        display: flex;
        gap: 0;
        margin-bottom: 1.5rem;
        background: var(--bg-primary);
        border-radius: var(--radius);
        padding: 4px;
      }

      .room-join__tab {
        flex: 1;
        padding: 0.6rem 1rem;
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--text-secondary);
        transition: all var(--transition);
      }

      .room-join__tab:hover {
        color: var(--text-primary);
      }

      .room-join__tab--active {
        background: var(--bg-elevated);
        color: var(--text-primary);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .room-join__form {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
      }

      .room-join__field {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      .room-join__field label {
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--text-secondary);
      }

      .room-join__field input {
        background: var(--bg-primary);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.75rem 1rem;
        color: var(--text-primary);
        transition: border-color var(--transition);
        outline: none;
      }

      .room-join__field input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      .room-join__field input::placeholder {
        color: var(--text-muted);
      }

      .room-join__submit {
        background: var(--accent);
        color: #fff;
        padding: 0.8rem 1.5rem;
        border-radius: var(--radius);
        font-weight: 600;
        font-size: 0.95rem;
        transition: background var(--transition), transform var(--transition);
        margin-top: 0.5rem;
      }

      .room-join__submit:hover:not(:disabled) {
        background: var(--accent-hover);
        transform: translateY(-1px);
      }

      .room-join__submit:active:not(:disabled) {
        transform: translateY(0);
      }

      .room-join__submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .room-join__error {
        background: rgba(244, 67, 54, 0.1);
        border: 1px solid rgba(244, 67, 54, 0.3);
        color: var(--error);
        padding: 0.6rem 1rem;
        border-radius: var(--radius);
        font-size: 0.85rem;
        margin-bottom: 0.5rem;
      }

      /* === Room Layout === */
      .room-layout {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      .room-layout__video {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .room-layout__chat {
        width: 320px;
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        background: var(--bg-secondary);
      }

      /* === Video Player === */
      .video-player {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        position: relative;
      }

      .video-player--active {
        flex-direction: column;
      }

      .video-player__video {
        width: 100%;
        height: 100%;
        flex: 1;
        object-fit: contain;
        background: #000;
        cursor: pointer;
      }

      .video-player__iframe {
        width: 100%;
        flex: 1;
        border: none;
        background: #000;
      }

      .video-player__buffering {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.5);
        z-index: 5;
        pointer-events: none;
      }

      .video-player__spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .video-player__controls {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.5rem 0.75rem;
        background: var(--bg-secondary);
        border-top: 1px solid var(--border);
        width: 100%;
      }

      .video-player__controls--embed {
        justify-content: space-between;
      }

      .video-player__play-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: var(--radius);
        color: var(--text-primary);
        transition: background var(--transition);
        flex-shrink: 0;
      }

      .video-player__play-btn:hover {
        background: var(--bg-elevated);
      }

      .video-player__seek-container {
        flex: 1;
        display: flex;
        align-items: center;
        min-width: 0;
      }

      .video-player__seek {
        width: 100%;
        height: 4px;
        appearance: none;
        -webkit-appearance: none;
        background: var(--bg-elevated);
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }

      .video-player__seek::-webkit-slider-thumb {
        appearance: none;
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
      }

      .video-player__seek::-moz-range-thumb {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        border: none;
      }

      .video-player__time {
        font-size: 0.75rem;
        color: var(--text-secondary);
        font-family: monospace;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .video-player__volume {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        flex-shrink: 0;
      }

      .video-player__volume-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: var(--radius);
        color: var(--text-secondary);
        transition: background var(--transition), color var(--transition);
      }

      .video-player__volume-btn:hover {
        background: var(--bg-elevated);
        color: var(--text-primary);
      }

      .video-player__volume-slider {
        width: 60px;
        height: 3px;
        appearance: none;
        -webkit-appearance: none;
        background: var(--bg-elevated);
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }

      .video-player__volume-slider::-webkit-slider-thumb {
        appearance: none;
        -webkit-appearance: none;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--text-secondary);
        cursor: pointer;
      }

      .video-player__volume-slider::-moz-range-thumb {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--text-secondary);
        cursor: pointer;
        border: none;
      }

      .video-player__fullscreen-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: var(--radius);
        color: var(--text-secondary);
        transition: background var(--transition), color var(--transition);
        flex-shrink: 0;
      }

      .video-player__fullscreen-btn:hover {
        background: var(--bg-elevated);
        color: var(--text-primary);
      }

      .video-player__embed-status {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .video-player__placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        color: var(--text-muted);
      }

      .video-player__placeholder svg {
        opacity: 0.4;
      }

      .video-player__placeholder p {
        font-size: 0.9rem;
      }

      .video-player__room-code {
        font-size: 0.85rem;
        color: var(--text-secondary);
      }

      .video-player__room-code strong {
        color: var(--accent);
        font-family: monospace;
        letter-spacing: 1px;
      }

      /* Fullscreen styles */
      .video-player:fullscreen {
        display: flex;
        flex-direction: column;
      }

      .video-player:fullscreen .video-player__video {
        flex: 1;
      }

      .video-player:fullscreen .video-player__controls {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(26, 26, 36, 0.9);
        z-index: 10;
      }

      /* === Chat === */
      .chat {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .chat__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.8rem 1rem;
        border-bottom: 1px solid var(--border);
      }

      .chat__header h3 {
        font-size: 0.95rem;
        font-weight: 600;
      }

      .chat__room-code {
        font-size: 0.75rem;
        font-family: monospace;
        color: var(--text-muted);
        background: var(--bg-primary);
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
      }

      .chat__messages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
      }

      .chat__empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-muted);
        font-size: 0.85rem;
      }

      .chat__input-area {
        display: flex;
        gap: 0.5rem;
        padding: 0.75rem;
        border-top: 1px solid var(--border);
        background: var(--bg-primary);
      }

      .chat__input {
        flex: 1;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.6rem 0.8rem;
        color: var(--text-primary);
        outline: none;
        font-size: 0.9rem;
      }

      .chat__input:focus {
        border-color: var(--accent);
      }

      .chat__input::placeholder {
        color: var(--text-muted);
      }

      .chat__send {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        background: var(--accent);
        border-radius: var(--radius);
        color: #fff;
        transition: background var(--transition);
      }

      .chat__send:hover {
        background: var(--accent-hover);
      }

      /* === Reaction Overlay === */
      .reaction-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 100;
        overflow: hidden;
      }

      .reaction-overlay__emoji {
        position: absolute;
        font-size: 2rem;
        animation: float-up 3s ease-out forwards;
      }

      @keyframes float-up {
        0% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateY(-200px) scale(0.5);
        }
      }

      /* === Status Bar === */
      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.5rem 1rem;
        background: var(--bg-secondary);
        border-top: 1px solid var(--border);
        font-size: 0.8rem;
      }

      .status-bar__connection {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .status-bar__dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .status-bar__label {
        color: var(--text-secondary);
      }

      .status-bar__info {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .status-bar__participants {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--text-secondary);
      }

      /* === Responsive === */
      @media (max-width: 768px) {
        .room-layout {
          flex-direction: column;
        }

        .room-layout__chat {
          width: 100%;
          height: 250px;
          border-left: none;
          border-top: 1px solid var(--border);
        }

        .room-layout__video {
          flex: 1;
        }

        .room-join__card {
          padding: 1.5rem;
        }
      }

      @media (max-width: 480px) {
        .room-join__title {
          font-size: 1.8rem;
        }

        .room-join__card {
          padding: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
